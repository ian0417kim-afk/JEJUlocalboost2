<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>제주 감성숙소 | Jeju Premium Stay | 济州精品民宿</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Noto+Sans+SC:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --sand: #F2EDE4; --stone: #C4B5A0; --earth: #8B7355;
    --deep: #3D2E20; --moss: #6B7C5C; --cream: #FAF7F2; --text: #2A1F14;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--cream); color:var(--text); font-family:'Noto Serif KR',serif; }

  .hero {
    position:relative; height:100vh; min-height:600px;
    background:linear-gradient(160deg,#2A3D35 0%,#1A2820 40%,#0D1F18 100%);
    display:flex; flex-direction:column; align-items:center; justify-content:center; overflow:hidden;
  }
  .hero-orb { position:absolute; border-radius:50%; filter:blur(80px); opacity:0.15; }
  .hero-orb-1 { width:600px; height:600px; background:#6B9E7A; top:-200px; right:-100px; }
  .hero-orb-2 { width:400px; height:400px; background:#4A7A8A; bottom:-100px; left:-50px; }
  .hero-badge { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:0.9rem; letter-spacing:0.3em; color:var(--stone); text-transform:uppercase; margin-bottom:1.5rem; animation:fadeUp 1s ease both; }
  .hero-title { font-family:'Cormorant Garamond',serif; font-weight:300; font-size:clamp(2.5rem,6vw,5rem); color:#F2EDE4; text-align:center; line-height:1.1; letter-spacing:0.05em; animation:fadeUp 1s ease 0.2s both; }
  .hero-title-ko { font-family:'Noto Serif KR',serif; font-weight:300; font-size:clamp(1.2rem,3vw,1.8rem); color:var(--stone); text-align:center; letter-spacing:0.3em; margin-top:0.8rem; animation:fadeUp 1s ease 0.4s both; }
  .hero-divider { width:60px; height:1px; background:var(--stone); margin:2rem auto; animation:fadeUp 1s ease 0.6s both; }
  .hero-sub { font-size:0.85rem; letter-spacing:0.2em; color:rgba(196,181,160,0.7); text-align:center; animation:fadeUp 1s ease 0.8s both; }
  .hero-scroll { position:absolute; bottom:2rem; left:50%; transform:translateX(-50%); display:flex; flex-direction:column; align-items:center; gap:0.5rem; color:rgba(196,181,160,0.5); font-size:0.7rem; letter-spacing:0.2em; animation:fadeUp 1s ease 1.2s both; }
  .hero-scroll-line { width:1px; height:40px; background:linear-gradient(to bottom,rgba(196,181,160,0.5),transparent); animation:scrollLine 1.5s ease-in-out infinite; }
  @keyframes scrollLine { 0%,100%{transform:scaleY(1);opacity:1} 50%{transform:scaleY(0.5);opacity:0.3} }
  @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

  .lang-bar { background:var(--deep); padding:0.8rem 2rem; display:flex; justify-content:flex-end; gap:1rem; }
  .lang-btn { background:none; border:1px solid rgba(196,181,160,0.3); color:var(--stone); padding:0.3rem 0.8rem; border-radius:2px; cursor:pointer; font-size:0.75rem; letter-spacing:0.1em; transition:all 0.3s; font-family:inherit; }
  .lang-btn.active, .lang-btn:hover { background:var(--earth); border-color:var(--earth); color:white; }

  .filter-section { background:white; padding:2rem; border-bottom:1px solid rgba(196,181,160,0.2); position:sticky; top:0; z-index:100; box-shadow:0 2px 20px rgba(0,0,0,0.05); }
  .filter-label { font-size:0.7rem; letter-spacing:0.3em; color:var(--stone); text-transform:uppercase; margin-bottom:1rem; text-align:center; }
  .filter-tabs { display:flex; gap:0.5rem; justify-content:center; flex-wrap:wrap; }
  .filter-tab { background:none; border:1px solid var(--stone); color:var(--earth); padding:0.5rem 1.5rem; border-radius:30px; cursor:pointer; font-size:0.85rem; font-family:'Noto Serif KR',serif; letter-spacing:0.05em; transition:all 0.3s; }
  .filter-tab.active, .filter-tab:hover { background:var(--deep); border-color:var(--deep); color:white; }

  .main { max-width:1400px; margin:0 auto; padding:4rem 2rem; }
  .section-header { text-align:center; margin-bottom:3rem; }
  .section-eyebrow { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:0.9rem; letter-spacing:0.3em; color:var(--moss); display:block; margin-bottom:0.5rem; }
  .section-title { font-family:'Noto Serif KR',serif; font-weight:300; font-size:1.8rem; color:var(--deep); letter-spacing:0.1em; }

  .stays-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:2rem; }

  .stay-card { background:white; border-radius:4px; overflow:hidden; box-shadow:0 4px 30px rgba(0,0,0,0.06); transition:transform 0.4s,box-shadow 0.4s; cursor:pointer; display:flex; flex-direction:column; }
  .stay-card:hover { transform:translateY(-6px); box-shadow:0 12px 50px rgba(0,0,0,0.12); }
  .card-img { position:relative; height:220px; background:var(--sand); overflow:hidden; }
  .card-img img { width:100%; height:100%; object-fit:cover; transition:transform 0.6s; }
  .stay-card:hover .card-img img { transform:scale(1.05); }
  .card-img-placeholder { width:100%; height:100%; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,var(--sand),var(--stone)); color:white; font-size:3rem; }
  .card-region { position:absolute; top:1rem; left:1rem; background:rgba(61,46,32,0.85); color:white; font-size:0.7rem; letter-spacing:0.15em; padding:0.3rem 0.8rem; border-radius:2px; backdrop-filter:blur(4px); }
  .card-rating { position:absolute; top:1rem; right:1rem; background:rgba(255,255,255,0.95); color:var(--deep); font-size:0.8rem; font-weight:600; padding:0.3rem 0.7rem; border-radius:2px; display:flex; align-items:center; gap:0.3rem; }
  .star { color:#D4A840; }
  .card-body { padding:1.5rem; flex:1; display:flex; flex-direction:column; }
  .card-type { font-size:0.7rem; letter-spacing:0.2em; color:var(--moss); text-transform:uppercase; margin-bottom:0.5rem; }
  .card-name { font-family:'Noto Serif KR',serif; font-size:1.1rem; font-weight:600; color:var(--deep); margin-bottom:0.5rem; line-height:1.3; }
  .card-review { font-size:0.82rem; color:#888; line-height:1.5; margin-bottom:1rem; flex:1; font-style:italic; }
  .card-tags { display:flex; flex-wrap:wrap; gap:0.4rem; margin-bottom:1rem; }
  .tag { background:var(--sand); color:var(--earth); font-size:0.68rem; padding:0.25rem 0.6rem; border-radius:2px; }
  .card-footer { display:flex; justify-content:space-between; align-items:center; padding-top:1rem; border-top:1px solid var(--sand); }
  .card-price { font-family:'Cormorant Garamond',serif; font-size:1.1rem; color:var(--earth); }
  .card-map-btn { background:var(--deep); color:white; border:none; padding:0.5rem 1rem; border-radius:2px; font-size:0.75rem; letter-spacing:0.1em; cursor:pointer; transition:background 0.3s; font-family:inherit; text-decoration:none; display:inline-block; }
  .card-map-btn:hover { background:var(--earth); }

  .loading { text-align:center; padding:5rem; color:var(--stone); grid-column:1/-1; }
  .loading-dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--stone); margin:0 4px; animation:loadDot 1.2s ease-in-out infinite; }
  .loading-dot:nth-child(2){animation-delay:0.2s} .loading-dot:nth-child(3){animation-delay:0.4s}
  @keyframes loadDot { 0%,80%,100%{transform:scale(0.8);opacity:0.4} 40%{transform:scale(1.2);opacity:1} }

  footer { background:var(--deep); color:var(--stone); text-align:center; padding:3rem 2rem; font-size:0.8rem; letter-spacing:0.1em; line-height:2; }
  .empty-state { text-align:center; padding:4rem; color:var(--stone); grid-column:1/-1; }
  @media(max-width:768px){ .stays-grid{grid-template-columns:1fr} .main{padding:2rem 1rem} .filter-tab{padding:0.4rem 1rem;font-size:0.8rem} }
</style>
</head>
<body>

<section class="hero">
  <div class="hero-orb hero-orb-1"></div>
  <div class="hero-orb hero-orb-2"></div>
  <p class="hero-badge">Curated Private Stays</p>
  <h1 class="hero-title">Jeju Premium Stay</h1>
  <p class="hero-title-ko" id="hero-sub-ko">제주 감성 독채펜션</p>
  <div class="hero-divider"></div>
  <p class="hero-sub" id="hero-sub-desc">HANDPICKED · PRIVATE · UNFORGETTABLE</p>
  <div class="hero-scroll"><div class="hero-scroll-line"></div><span>SCROLL</span></div>
</section>

<div class="lang-bar">
  <button class="lang-btn active" onclick="setLang('ko')">한국어</button>
  <button class="lang-btn" onclick="setLang('en')">English</button>
  <button class="lang-btn" onclick="setLang('zh')">中文</button>
</div>

<div class="filter-section">
  <p class="filter-label" id="filter-label">지역 선택</p>
  <div class="filter-tabs">
    <button class="filter-tab active" onclick="filterRegion('all')"><span id="tab-all-text">전체</span></button>
    <button class="filter-tab" onclick="filterRegion('공항근체')"><span id="tab-airport-text">공항근처</span></button>
    <button class="filter-tab" onclick="filterRegion('제주서쪽')"><span id="tab-west-text">제주 서쪽</span></button>
    <button class="filter-tab" onclick="filterRegion('제주동쪽')"><span id="tab-east-text">제주 동쪽</span></button>
    <button class="filter-tab" onclick="filterRegion('서귀포')"><span id="tab-south-text">서귀포</span></button>
    <button class="filter-tab" onclick="filterRegion('해수욕장')"><span id="tab-beach-text">해수욕장</span></button>
  </div>
</div>

<main class="main">
  <div class="section-header">
    <span class="section-eyebrow" id="section-eyebrow">Selected Stays</span>
    <h2 class="section-title" id="section-title">엄선된 제주 감성숙소</h2>
  </div>
  <div id="stays-grid" class="stays-grid">
    <div class="loading"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div>
  </div>
</main>

<footer>
  <p>제주 감성숙소 | Jeju Premium Stay | 济州精品民宿</p>
  <p style="margin-top:0.5rem;opacity:0.5">Powered by LocalBoost · 로컬부스트</p>
</footer>

<script>
const i18n = {
  ko: { heroSub:'제주 감성 독채펜션', heroDesc:'엄선된 감성숙소 · 독채 · 잊지 못할 경험', filterLabel:'지역 선택', tabAll:'전체', tabAirport:'공항근처', tabWest:'제주 서쪽', tabEast:'제주 동쪽', tabSouth:'서귀포', tabBeach:'해수욕장', eyebrow:'Selected Stays', sectionTitle:'엄선된 제주 감성숙소', mapBtn:'지도 보기' },
  en: { heroSub:'Private Stays in Jeju', heroDesc:'HANDPICKED · PRIVATE · UNFORGETTABLE', filterLabel:'Filter by Region', tabAll:'All', tabAirport:'Near Airport', tabWest:'West Jeju', tabEast:'East Jeju', tabSouth:'Seogwipo', tabBeach:'Beachside', eyebrow:'Selected Stays', sectionTitle:'Curated Private Stays in Jeju', mapBtn:'Map' },
  zh: { heroSub:'济州岛精品独栋民宿', heroDesc:'精心甄选 · 独栋私属 · 难忘体验', filterLabel:'按地区筛选', tabAll:'全部', tabAirport:'机场附近', tabWest:'济州西部', tabEast:'济州东部', tabSouth:'西归浦', tabBeach:'海边', eyebrow:'Selected Stays', sectionTitle:'精选济州感性民宿', mapBtn:'查看地图' }
};

let currentLang = 'ko';
let currentRegion = 'all';
let allStays = [];

function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.lang-btn[onclick="setLang('${lang}')"]`).classList.add('active');
  const t = i18n[lang];
  document.getElementById('hero-sub-ko').textContent = t.heroSub;
  document.getElementById('hero-sub-desc').textContent = t.heroDesc;
  document.getElementById('filter-label').textContent = t.filterLabel;
  document.getElementById('tab-all-text').textContent = t.tabAll;
  document.getElementById('tab-airport-text').textContent = t.tabAirport;
  document.getElementById('tab-west-text').textContent = t.tabWest;
  document.getElementById('tab-east-text').textContent = t.tabEast;
  document.getElementById('tab-south-text').textContent = t.tabSouth;
  document.getElementById('tab-beach-text').textContent = t.tabBeach;
  document.getElementById('section-eyebrow').textContent = t.eyebrow;
  document.getElementById('section-title').textContent = t.sectionTitle;
  renderCards(getFiltered());
}

function filterRegion(region) {
  currentRegion = region;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  event.currentTarget.classList.add('active');
  renderCards(getFiltered());
}

function getFiltered() {
  if (currentRegion === 'all') return allStays;
  return allStays.filter(s => s.sheet === currentRegion);
}

function getName(s) {
  if (currentLang === 'en' && s.nameEN) return s.nameEN;
  if (currentLang === 'zh' && s.nameZH) return s.nameZH;
  return s.name;
}

function getReview(s) {
  if (currentLang === 'en' && s.reviewEN) return s.reviewEN;
  if (currentLang === 'zh' && s.reviewZH) return s.reviewZH;
  return s.review;
}

function renderCards(stays) {
  const grid = document.getElementById('stays-grid');
  const t = i18n[currentLang];
  if (!stays || stays.length === 0) {
    grid.innerHTML = `<div class="empty-state">No stays found.</div>`;
    return;
  }
  grid.innerHTML = stays.map((s, i) => {
    const tags = (s.tags || '').split(',').filter(Boolean).slice(0,4);
    const name = getName(s);
    const review = getReview(s);
    const imgHtml = s.photoUrl
      ? `<img src="${s.photoUrl}" alt="${name}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\'card-img-placeholder\\'>🏡</div>'">`
      : `<div class="card-img-placeholder">🏡</div>`;
    return `
      <div class="stay-card" style="animation:fadeUp 0.6s ease ${i*0.08}s both">
        <div class="card-img">
          ${imgHtml}
          <span class="card-region">${s.region||''}</span>
          ${s.rating ? `<div class="card-rating"><span class="star">★</span> ${s.rating} <small style="color:#999">(${s.reviews})</small></div>` : ''}
        </div>
        <div class="card-body">
          <p class="card-type">${s.type||''}</p>
          <h3 class="card-name">${name}</h3>
          ${review ? `<p class="card-review">"${review}"</p>` : ''}
          <div class="card-tags">${tags.map(tag=>`<span class="tag">${tag.trim()}</span>`).join('')}</div>
          <div class="card-footer">
            <div class="card-price">${s.price||'-'}</div>
            <a href="${s.mapUrl||'#'}" target="_blank" class="card-map-btn">${t.mapBtn}</a>
          </div>
        </div>
      </div>`;
  }).join('');
}

// 구글 시트 GID (실제 시트 탭 순서 기준)
const SHEET_ID = '1a0xg586S3O1BVzv9wb_ozIU7VXwOy6e0Q3pEiXRM-Tc';
const SHEETS = [
  { name:'공항근체', gid:'0' },
  { name:'공항근체', gid:'1989393732' },
  { name:'제주동쪽', gid:'200090792' },
  { name:'제주서쪽', gid:'586408597' },
  { name:'서귀포',   gid:'1946015364' },
  { name:'해수욕장', gid:'1963903077' }
];

async function loadSheetData(sheet) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${sheet.gid}`;
  try {
    const res = await fetch(url);
    const text = await res.text();
    const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]+)\)/)[1]);
    const rows = json.table.rows || [];
    return rows.slice(1).map(row => {
      const c = row.c;
      const val = i => (c[i] && c[i].v != null) ? String(c[i].v).trim() : '';
      return {
        sheet: sheet.name,
        name: val(0), region: val(1), type: val(2), address: val(3),
        phone: val(4), rating: val(5), reviews: val(6), review: val(7),
        tags: val(8), price: val(9), photoUrl: val(10), mapUrl: val(11),
        nameEN: val(12), nameZH: val(13), reviewEN: val(14), reviewZH: val(15)
      };
    }).filter(s => s.name);
  } catch(e) { console.error(sheet.name, e); return []; }
}

async function loadAllData() {
  const results = await Promise.all(SHEETS.map(loadSheetData));
  // 중복 제거 (공항근체 두 gid 시도)
  const seen = new Set();
  allStays = results.flat().filter(s => {
    if (seen.has(s.name)) return false;
    seen.add(s.name);
    return true;
  });
  renderCards(getFiltered());
}

loadAllData();
</script>
</body>
</html>
